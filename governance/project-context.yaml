    severity: medium
    mitigation: Deferred to dedicated session; pipeline is end-to-end functional with mocks
  - item: SQLite has no persistence on ECS task restart (no EFS volume)
    severity: low
    mitigation: Acceptable until Checkpoint 4 PostgreSQL migration
  - item: FastAPI Bridge not yet exposed as MCP server — team cannot call Trading Agents from Claude
    severity: medium
    mitigation: Next session — add mcp SDK layer to FastAPI Bridge

