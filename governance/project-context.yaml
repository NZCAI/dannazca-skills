# Critical project decisions
key_decisions:
  containerization_timing: Week 1-2 parallel with RBAC (not Phase 3)
  whatsapp_integration: via n8n webhook + FastAPI (no external auth yet)
  deployment_target: AWS Fargate serverless (~$70/month)
  context_max_lines: 200 (per-document for token efficiency)
  external_users: none (internal tools only, no public endpoints)
  authentication: JWT + RBAC middleware live in FastAPI Bridge (python-jose + PyJWT)
  http_fallback: EdgarTools HTTP is final (stdio was MVP)
  storage: SQLite (current, dev/staging) → Postgres Aurora/RDS + S3 (Checkpoint 4)
  orchestration: LangGraph 12-agent graph (n8n as trigger, FastAPI as entry point)
  ecs_image_platform: linux/amd64 required for Fargate — always build with docker buildx --platform linux/amd64
  ecs_task_ip: ephemeral public IP (changes on task restart) — ALB required for any team-facing service
  mcp_first: Team primary interface is Claude — MCP accessibility takes priority over infrastructure completeness
  fastapi_as_mcp: FastAPI Bridge will expose /mcp endpoint (mcp SDK) alongside existing REST routes — no separate service needed
  edgartools_delivery: EdgarTools MCP behind ALB is the fastest path to team value — shared endpoint, one config per user
  sqlite_rationale: SQLite is intentional for early development — zero infra, fast to ship. Breaks down at production because container restarts wipe data, concurrent writes cause locking, and it cannot serve as the knowledge base. Migrate to PostgreSQL when team is actively generating data worth keeping.
  storage_layer: Two-tier approach — Redis (TTL cache for hot queries: prices 1h, profiles 7d, filings 30d) + PostgreSQL (permanent time-series store for financial data, agent outputs, EDGAR snapshots). Builds proprietary knowledge base over time. Redis doubles as Celery job queue. PostgreSQL migration is the dependency for both.

# Active blockers (none if empty)
active_blockers:
