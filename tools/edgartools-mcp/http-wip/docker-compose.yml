services:
  edgartools-mcp-http:
    image: python:3.12-slim
    container_name: edgartools-mcp-http
    environment:
      EDGAR_IDENTITY: ${EDGAR_IDENTITY}
    command: >
      sh -c "pip install --no-cache-dir 'edgartools[ai]' &&
             edgartools-mcp --transport streamable-http --host 0.0.0.0 --port 8765"
    ports:
      - "8765:8765"
    restart: unless-stopped
